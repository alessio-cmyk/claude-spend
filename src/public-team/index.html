<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Spend - Team Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F8F9FC; --white: #FFFFFF; --text: #0F172A;
    --text-secondary: #475569; --text-tertiary: #94A3B8;
    --border: rgba(0,0,0,0.06); --border-strong: rgba(0,0,0,0.1);
    --indigo: #6366F1; --violet: #8B5CF6; --teal: #14B8A6;
    --emerald: #10B981; --amber: #F59E0B; --orange: #F97316;
    --rose: #F43F5E; --blue: #3B82F6;
    --gradient-main: linear-gradient(135deg, #6366F1, #8B5CF6, #A855F7);
    --gradient-teal: linear-gradient(135deg, #14B8A6, #06B6D4);
    --gradient-warm: linear-gradient(135deg, #F59E0B, #F97316);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
    --radius: 16px; --radius-sm: 10px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; top: 0; left: 0; right: 0; height: 600px;
    background: radial-gradient(ellipse 80% 60% at 10% 0%, rgba(99,102,241,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 10%, rgba(139,92,246,0.08) 0%, transparent 50%),
      radial-gradient(ellipse 50% 40% at 50% 20%, rgba(20,184,166,0.06) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 20px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--indigo); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-secondary); font-size: 15px; font-weight: 500; }
  .container { max-width: 1200px; margin: 0 auto; padding: 40px 28px 60px; position: relative; z-index: 1; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .animate { animation: fadeUp 0.5s ease-out both; }
  .delay-1 { animation-delay: 0.05s; } .delay-2 { animation-delay: 0.1s; }
  .delay-3 { animation-delay: 0.15s; } .delay-4 { animation-delay: 0.2s; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-mark { width: 40px; height: 40px; border-radius: 12px; background: var(--gradient-main); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
  .logo-mark svg { width: 22px; height: 22px; }
  .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* Tabs */
  .nav-tabs { display: flex; gap: 4px; background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
  .nav-tab { padding: 8px 20px; border-radius: 9px; font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; border: none; background: none; font-family: var(--font); }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { background: var(--indigo); color: white; box-shadow: 0 2px 8px rgba(99,102,241,0.25); }

  /* Buttons */
  .btn { background: var(--white); border: 1px solid var(--border); color: var(--text-secondary); padding: 7px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--font); transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { border-color: var(--indigo); color: var(--indigo); box-shadow: 0 2px 8px rgba(99,102,241,0.12); }

  /* Date bar */
  .date-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .presets { display: flex; gap: 4px; }
  .preset { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--text-secondary); transition: all 0.15s; font-family: var(--font); }
  .preset:hover { border-color: var(--indigo); color: var(--indigo); }
  .preset.active { background: var(--indigo); color: white; border-color: var(--indigo); }
  .custom-range { display: flex; align-items: center; gap: 6px; margin-left: 8px; }
  .custom-range input[type="date"] { padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 12px; font-weight: 500; font-family: var(--font); color: var(--text); background: var(--white); outline: none; }
  .custom-range input[type="date"]:focus { border-color: var(--indigo); }
  .apply-btn { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: var(--indigo); color: white; font-family: var(--font); }
  .active-range { font-size: 12px; color: var(--text-tertiary); font-weight: 500; margin-left: auto; }

  /* Cards */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stats-row-5 { grid-template-columns: repeat(5, 1fr); }
  @media (max-width: 900px) { .stats-row, .stats-row-5 { grid-template-columns: repeat(2, 1fr); } }
  .stat-card { background: var(--white); border-radius: var(--radius); padding: 22px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: box-shadow 0.2s; }
  .stat-card:hover { box-shadow: var(--shadow-md); }
  .stat-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .stat-value { font-size: 30px; font-weight: 800; letter-spacing: -1.5px; line-height: 1; margin-bottom: 5px; }
  .stat-sub { font-size: 12px; color: var(--text-tertiary); font-weight: 500; }

  /* Section */
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .section-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .section-icon svg { width: 16px; height: 16px; }
  .section-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }

  /* Tables */
  .table-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 28px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-tertiary); border-bottom: 1px solid var(--border); background: #FAFBFC; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--text-secondary); }
  th.sorted { color: var(--indigo); }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr { transition: background 0.1s; cursor: pointer; }
  tbody tr:hover td { background: #FAFBFF; }
  tbody tr:last-child td { border-bottom: none; }
  .token-num { font-family: var(--mono); font-size: 12px; font-weight: 600; text-align: right; white-space: nowrap; letter-spacing: -0.3px; }

  /* Badges */
  .rank-badge { width: 26px; height: 26px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text-secondary); background: var(--bg); }
  .rank-1 { background: var(--gradient-main); color: white; }
  .rank-2 { background: var(--gradient-teal); color: white; }
  .rank-3 { background: var(--gradient-warm); color: white; }
  .trend-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .trend-up { background: #ECFDF5; color: #047857; }
  .trend-down { background: #FEF2F2; color: #B91C1C; }
  .trend-flat { background: #F1F5F9; color: #475569; }
  .model-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .model-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .model-opus { background: #EEF2FF; color: #3730A3; } .model-opus .model-dot { background: #4F46E5; }
  .model-sonnet { background: #ECFDF5; color: #047857; } .model-sonnet .model-dot { background: #10B981; }
  .model-haiku { background: #FFF7ED; color: #C2410C; } .model-haiku .model-dot { background: #F97316; }
  .model-unknown { background: #F1F5F9; color: #475569; }

  .bar-track { height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .recency-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  /* Charts */
  .charts-grid { display: grid; grid-template-columns: 5fr 2fr; gap: 16px; margin-bottom: 28px; }
  @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-card { background: var(--white); border-radius: var(--radius); padding: 22px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
  .chart-card h3 { font-size: 12px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
  canvas { display: block; }
  .legend { display: flex; gap: 16px; margin-top: 14px; font-size: 11px; font-weight: 500; color: var(--text-secondary); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 3px; flex-shrink: 0; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  @media (max-width: 800px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  /* Health score */
  .health-ring { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; flex-shrink: 0; }

  /* ROI bars */
  .roi-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .roi-label { width: 130px; font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .roi-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .roi-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .roi-value { width: 32px; font-size: 13px; font-weight: 700; text-align: right; }

  /* Tool bars */
  .tool-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .tool-name { width: 130px; font-size: 11px; color: var(--text-secondary); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-count { width: 40px; font-size: 11px; font-weight: 600; text-align: right; font-family: var(--mono); }

  .proj-name { font-weight: 600; font-size: 12px; font-family: var(--mono); letter-spacing: -0.2px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
  .empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 12px; }
  .empty-state code { background: var(--bg); padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--indigo); }
  .footer { text-align: center; padding: 24px; color: var(--text-tertiary); font-size: 13px; font-weight: 500; }
  .footer a { color: var(--indigo); text-decoration: none; font-weight: 600; }

  /* Productivity table */
  .prod-table td { font-size: 12px; }
  .prod-table .dev-name { font-weight: 600; font-size: 13px; }
  .mini-bar { display: inline-block; height: 4px; border-radius: 2px; vertical-align: middle; }

  /* === FEATURE 1: Heatmap === */
  .heatmap-tooltip { position: fixed; pointer-events: none; background: var(--text); color: white; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; z-index: 9999; display: none; white-space: nowrap; }

  /* === FEATURE 6: First Prompts Log === */
  .prompts-toggle { background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: var(--font); transition: all 0.15s; width: 100%; text-align: left; }
  .prompts-toggle:hover { border-color: var(--indigo); color: var(--indigo); }
  .prompt-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .prompt-row:last-child { border-bottom: none; }
  .prompt-date { color: var(--text-tertiary); font-weight: 500; white-space: nowrap; min-width: 60px; }
  .prompt-text { color: var(--text-secondary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--mono); font-size: 11px; }

  /* === FEATURE 7: Streak Calendar === */
  .streak-stats { display: flex; gap: 20px; margin-top: 12px; font-size: 12px; font-weight: 600; color: var(--text-secondary); flex-wrap: wrap; }
  .streak-stat-val { font-size: 18px; font-weight: 800; color: var(--text); display: block; }

  /* === FEATURE 2: WoW Trend === */
  .wow-up { color: #047857; }
  .wow-down { color: #B91C1C; }
  .wow-stable { color: #64748b; }
  .wow-banner { font-size: 13px; color: var(--text-secondary); font-weight: 500; padding: 10px 16px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 16px; }

  /* === FEATURE 4: Inactive Dev Alert === */
  .inactive-alert { background: #FFFBEB; border: 1px solid #FDE68A; color: #92400E; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .inactive-alert-close { background: none; border: none; color: #92400E; cursor: pointer; font-size: 18px; font-weight: 700; padding: 0 4px; font-family: var(--font); }
  .inactive-alert-close:hover { color: #78350F; }
  .recency-dot.pulse { animation: pulse-dot 1.5s ease-in-out infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .dev-name-muted { color: var(--text-tertiary) !important; }
  .inactivity-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-left: 8px; }
  .inactivity-badge.warning { background: #FFFBEB; color: #92400E; }
  .inactivity-badge.critical { background: #FEF2F2; color: #B91C1C; }

  /* Getting Started Guide */
  .getting-started { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 28px; position: relative; }
  .getting-started-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .getting-started-header h3 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .getting-started-header h3 .gs-icon { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, #E0E7FF, #C7D2FE); display: inline-flex; align-items: center; justify-content: center; }
  .getting-started-dismiss { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 12px; font-weight: 600; font-family: var(--font); padding: 4px 10px; border-radius: 6px; transition: all 0.15s; }
  .getting-started-dismiss:hover { color: var(--text-secondary); background: var(--bg); }
  .gs-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 768px) { .gs-steps { grid-template-columns: 1fr; } }
  .gs-step { background: var(--bg); border-radius: var(--radius-sm); padding: 20px; position: relative; }
  .gs-step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--gradient-main); color: white; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 10px; }
  .gs-step h4 { font-size: 13px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .gs-step p { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 8px; }
  .gs-cmd { background: var(--white); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-family: var(--mono); font-size: 11px; color: var(--indigo); font-weight: 600; display: block; word-break: break-all; }
  .gs-or { font-size: 11px; color: var(--text-tertiary); font-weight: 600; text-transform: uppercase; margin: 6px 0; letter-spacing: 0.5px; }
  .gs-note { font-size: 11px; color: var(--text-tertiary); margin-top: 12px; font-style: italic; }
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading team data...</div>
</div>

<div id="app" class="container" style="display:none"></div>
<div class="heatmap-tooltip" id="heatmapTooltip"></div>
<div class="heatmap-tooltip" id="chartTooltip"></div>

<script>
// --- State ---
let LB_DATA = null;
let PROD_DATA = null;
let DEV_FULL_DATA = null; // full dev data for detail view
let currentTab = 'leaderboard'; // leaderboard | productivity | dev
let selectedDev = null;
let dateRange = { preset: 'all', from: null, to: null };
let sortState = { key: 'totalTokens', dir: 'desc' };
/* === FEATURE 2: WoW Data === */
let WOW_DATA = null;
/* === FEATURE 3: Health History === */
let HEALTH_HISTORY = null;
/* === FEATURE 4: Inactivity Data === */
let INACTIVITY_DATA = null;
let AUTH_ENABLED = false;
let inactiveAlertDismissed = false;
let gettingStartedDismissed = localStorage.getItem('cs_guide_dismissed') === '1';

// --- Helpers ---
function fmt(n) {
  if (n == null || isNaN(n)) return '0';
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 10000) return (n / 1e3).toFixed(0) + 'K';
  if (n >= 1000) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}
function fmtFull(n) { return (n || 0).toLocaleString(); }
function fmtCost(n) { return '$' + (n || 0).toFixed(2); }
function fmtPct(n) { return (n || 0).toFixed(1) + '%'; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatDate(d) {
  if (!d) return '';
  const p = d.split('-');
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[parseInt(p[1])-1] + ' ' + parseInt(p[2]);
}
function toISO(d) { return d.toISOString().split('T')[0]; }
function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); return toISO(d); }
function modelClass(m) { if(m.includes('opus'))return'model-opus'; if(m.includes('sonnet'))return'model-sonnet'; if(m.includes('haiku'))return'model-haiku'; return'model-unknown'; }
function modelShort(m) {
  let x = m.match(/^claude-(opus|sonnet|haiku)-(\d+)-(\d+)/i);
  if (x) return x[1][0].toUpperCase()+x[1].slice(1)+' '+x[2]+'.'+x[3];
  x = m.match(/^claude-(\d+)-(\d+)-(opus|sonnet|haiku)/i);
  if (x) return x[3][0].toUpperCase()+x[3].slice(1)+' '+x[1]+'.'+x[2];
  if(m.includes('opus'))return'Opus'; if(m.includes('sonnet'))return'Sonnet'; if(m.includes('haiku'))return'Haiku'; return m;
}
function projShort(p) {
  if (!p||p==='unknown') return 'unknown';
  let s = p.replace(/^[A-Za-z]--/,'');
  const k = /^(?:Users|home|user)-[^-]+-|^(?:GitHub|GitLab|git|Projects|projects|workspace|Workspace|Desktop|Documents|source|src|dev|Dev|code|Code|repos|Repos)-/;
  let prev; do{prev=s;s=s.replace(k,'');}while(s!==prev&&s.length>0); return s||p;
}
function projDecode(p) {
  if (!p || p === 'unknown') return 'Unknown';
  const parts = p.replace(/^[A-Za-z]--/, '').split(/[-]|%2F/i);
  const seg = parts.filter(s => s && !['Users','home','user','GitHub','GitLab','git','Projects','projects','workspace','Workspace','Desktop','Documents','source','src','dev','Dev','code','Code','repos','Repos'].includes(s)).pop();
  if (!seg) return projShort(p);
  return seg.charAt(0).toUpperCase() + seg.slice(1);
}
function recencyColor(ls) {
  if (!ls) return '#CBD5E1';
  const h = (Date.now() - new Date(ls).getTime()) / 3600000;
  return h < 24 ? '#10B981' : h < 72 ? '#F59E0B' : '#F87171';
}
function trendBadge(t) {
  const c = t > 10 ? 'trend-up' : t < -10 ? 'trend-down' : 'trend-flat';
  return `<span class="trend-badge ${c}">${t > 0 ? '+' : ''}${t}%</span>`;
}
const MODEL_COLORS = { opus: '#6366F1', sonnet: '#10B981', haiku: '#F97316' };
const COLORS = ['#6366F1','#10B981','#F59E0B','#F43F5E','#3B82F6','#EC4899','#06B6D4','#8B5CF6','#F97316','#14B8A6'];
const DEV_COLORS = ['#6366F1','#10B981','#F59E0B','#F43F5E','#3B82F6','#EC4899','#06B6D4','#8B5CF6','#F97316','#14B8A6','#EF4444','#84CC16'];
function getModelColor(m) { for (const [k,c] of Object.entries(MODEL_COLORS)) { if(m.includes(k))return c; } return '#94A3B8'; }

// --- API ---
function getDateParams() {
  if (dateRange.preset === 'all') return '';
  let from, to = toISO(new Date());
  if (dateRange.preset === 'custom') { from = dateRange.from; to = dateRange.to || to; }
  else { const days = {'1d':1,'7d':7,'30d':30,'90d':90}; from = daysAgo(days[dateRange.preset]); }
  return `from=${from}&to=${to}`;
}

async function loadData() {
  try {
    const dp = getDateParams();
    const q = dp ? '?' + dp : '';
    const [lbRes, prodRes, wowRes, inactRes, hhRes, healthRes] = await Promise.all([
      fetch('/api/team/leaderboard' + q),
      fetch('/api/team/productivity' + q),
      /* === FEATURE 2: WoW always fetched independently of date range === */
      fetch('/api/team/wow'),
      /* === FEATURE 4: Inactivity always fetched independently of date range === */
      fetch('/api/team/inactivity'),
      /* === FEATURE 3: Health history === */
      fetch('/api/team/health-history?days=' + (dateRange.preset === '1d' ? 7 : dateRange.preset === '7d' ? 14 : dateRange.preset === '30d' ? 30 : dateRange.preset === '90d' ? 90 : 60)),
      fetch('/api/team/health'),
    ]);
    LB_DATA = await lbRes.json();
    PROD_DATA = await prodRes.json();
    WOW_DATA = await wowRes.json();
    INACTIVITY_DATA = await inactRes.json();
    HEALTH_HISTORY = await hhRes.json();
    try { const h = await healthRes.json(); AUTH_ENABLED = !!h.authEnabled; } catch {}
    DEV_FULL_DATA = null;
    render();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<div style="font-size:48px;margin-bottom:16px">&#9888;&#65039;</div>' +
      '<div style="color:#64748b;font-size:15px">Failed to load: ' + esc(e.message) + '</div>';
  }
}

function render() {
  document.getElementById('loading').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'block';
  app.innerHTML = '';
  if (currentTab === 'dev') renderDevView(app);
  else renderMainView(app);
}

function setTab(tab) { currentTab = tab; render(); }
function setPreset(p) { dateRange = {preset:p,from:null,to:null}; loadData(); }
function applyCustom() {
  const f = document.getElementById('dateFrom').value;
  const t = document.getElementById('dateTo').value;
  if (!f) return;
  dateRange = {preset:'custom',from:f,to:t||toISO(new Date())}; loadData();
}
function goToDev(id) { selectedDev = id; currentTab = 'dev'; DEV_FULL_DATA = null; render(); }
function goBack() { currentTab = 'leaderboard'; selectedDev = null; DEV_FULL_DATA = null; render(); }

/* === FEATURE 8: CSV Export === */
function exportCSV() {
  const devs = PROD_DATA.developers.filter(d => d.sessions > 0);
  const headers = ['Developer','TotalSessions','TotalQueries','TotalCost($)','AvgQueriesPerSession','CacheHitRate(%)','ToolActivationRate(%)','CurrentStreak(days)','LastActive','HealthScore(0-100)'];
  const rows = devs.map(d => {
    const health = Math.round(computeHealth(d));
    const lastActive = d.dailyBreakdown.length ? d.dailyBreakdown[d.dailyBreakdown.length-1].date : '';
    return [d.devId, d.sessions, d.queries, d.cost.toFixed(2), d.avgQueriesPerSession, d.cacheHitRate.toFixed(1), d.toolActivationRate, d.streak, lastActive, health].join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = toISO(new Date());
  a.href = url; a.download = `claude-code-team-${today}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// --- Analytics ---
function computeHealth(d) {
  const qDepth = Math.min(20, (d.avgQueriesPerSession / 10) * 20);
  const toolAct = Math.min(20, (d.toolActivationRate / 100) * 20);
  const toolDiv = Math.min(15, (d.uniqueTools / 10) * 15);
  const cache = Math.min(20, (d.cacheHitRate / 50) * 20);
  const modelCount = Object.keys(d.modelUsage).length;
  const modelDisc = modelCount <= 2 ? 10 : modelCount <= 4 ? 7 : 4;
  const consist = Math.min(15, (d.activeDays / 30) * 15);
  return qDepth + toolAct + toolDiv + cache + modelDisc + consist;
}

function computeROI(d) {
  return [
    { label: 'Query Depth', score: Math.min(100, (d.avgQueriesPerSession / 15) * 100) },
    { label: 'Tool Activation', score: Math.min(100, d.toolActivationRate) },
    { label: 'Cache Leverage', score: Math.min(100, d.cacheHitRate * 2) },
    { label: 'Consistency', score: Math.min(100, (d.activeDays / 30) * 100) },
    { label: 'Cost Efficiency', score: Math.min(100, Math.max(0, d.queries > 0 ? (1 - (d.cost / d.queries) / 0.10) * 100 : 0)) },
    { label: 'Model Discipline', score: Object.keys(d.modelUsage).length <= 2 ? 100 : Object.keys(d.modelUsage).length <= 4 ? 70 : 40 },
  ];
}

/* === FEATURE 2: ROI Radar computations === */
function computeROIRadar(d, allDevs) {
  // 1. Query Depth: avg queries/session, normalise 0-20+ -> 0-100
  const queryDepth = Math.min(100, (d.avgQueriesPerSession / 20) * 100);

  // 2. Tool Activation Rate: % sessions with >= 1 tool call
  const toolActivation = Math.min(100, d.toolActivationRate);

  // 3. Cache Leverage: cacheReadTokens / (inputTokens + cacheReadTokens) * 100
  const cacheInput = (d.inputTokens || 0) + (d.cacheReadTokens || 0);
  const cacheLeverage = cacheInput > 0 ? ((d.cacheReadTokens || 0) / cacheInput) * 100 : 0;

  // 4. Session Consistency: % working days (Mon-Fri) with >= 1 session
  const daily = d.dailyBreakdown || [];
  const allDates = daily.map(x => x.date).filter(Boolean).sort();
  let workingDaysTotal = 0, workingDaysActive = 0;
  if (allDates.length > 0) {
    const start = new Date(allDates[0]);
    const end = new Date(allDates[allDates.length - 1]);
    const activeDateSet = new Set(allDates);
    for (let dt = new Date(start); dt <= end; dt.setDate(dt.getDate() + 1)) {
      const dow = dt.getDay();
      if (dow >= 1 && dow <= 5) {
        workingDaysTotal++;
        if (activeDateSet.has(toISO(dt))) workingDaysActive++;
      }
    }
  }
  const sessionConsistency = workingDaysTotal > 0 ? (workingDaysActive / workingDaysTotal) * 100 : 0;

  // 5. Cost Efficiency: outputTokens / cost, normalised against team max
  const costEff = d.cost > 0 ? (d.outputTokens || 0) / d.cost : 0;
  const maxCostEff = Math.max(...allDevs.map(x => x.cost > 0 ? (x.outputTokens || 0) / x.cost : 0), 1);
  const costEfficiency = (costEff / maxCostEff) * 100;

  // 6. Model Discipline: % queries NOT on most expensive model (non-Opus)
  const totalQ = Object.values(d.modelUsage).reduce((s, v) => s + (v.queries || 0), 0);
  let opusQ = 0;
  for (const [m, v] of Object.entries(d.modelUsage)) {
    if (m.includes('opus')) opusQ += v.queries || 0;
  }
  const modelDiscipline = totalQ > 0 ? ((totalQ - opusQ) / totalQ) * 100 : 100;

  return [
    { label: 'Query Depth', score: queryDepth, raw: d.avgQueriesPerSession },
    { label: 'Tool Activation', score: toolActivation, raw: d.toolActivationRate + '%' },
    { label: 'Cache Leverage', score: Math.min(100, cacheLeverage), raw: cacheLeverage.toFixed(1) + '%' },
    { label: 'Consistency', score: Math.min(100, sessionConsistency), raw: sessionConsistency.toFixed(0) + '%' },
    { label: 'Cost Efficiency', score: Math.min(100, costEfficiency), raw: fmt(Math.round(costEff)) },
    { label: 'Model Discipline', score: Math.min(100, modelDiscipline), raw: modelDiscipline.toFixed(0) + '%' },
  ];
}

/* === FEATURE 3: Daily Bar Chart with Cost Line + Power Day Markers === */
function renderStackedBarChart(id, daily) {
  const canvas = document.getElementById(id);
  if (!canvas || !daily || !daily.length) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth - 48;
  const h = 200;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);

  const queryVals = daily.map(d => d.queries || 0);
  const costVals = daily.map(d => d.cost || 0);
  const maxQ = Math.max(...queryVals, 1);
  const maxCost = Math.max(...costVals, 0.01);

  // Power day markers (p90)
  const sortedQ = [...queryVals].sort((a, b) => a - b);
  const p90 = sortedQ[Math.floor(sortedQ.length * 0.9)] || Infinity;

  const barW = Math.max(4, Math.min(24, (w - 80) / daily.length - 2));
  const gap = 2; const chartH = h - 36; const startX = 44; const rightMargin = 40;

  // Left Y-axis (queries)
  ctx.font = '500 9px Inter, system-ui'; ctx.fillStyle = '#94A3B8'; ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = (maxQ / 4) * i;
    const y = chartH - (chartH * i / 4) + 8;
    ctx.fillText(fmt(Math.round(val)), startX - 8, y + 3);
    ctx.strokeStyle = 'rgba(0,0,0,0.04)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(w - rightMargin, y); ctx.stroke();
  }

  // Right Y-axis (cost)
  ctx.textAlign = 'left';
  for (let i = 0; i <= 4; i++) {
    const val = (maxCost / 4) * i;
    const y = chartH - (chartH * i / 4) + 8;
    ctx.fillText('$' + val.toFixed(val >= 10 ? 0 : val >= 1 ? 1 : 2), w - rightMargin + 6, y + 3);
  }

  const grad = ctx.createLinearGradient(0, chartH + 8, 0, 0);
  grad.addColorStop(0, '#818CF8'); grad.addColorStop(1, '#6366F1');

  // Query bars
  daily.forEach((d, i) => {
    const x = startX + i * (barW + gap);
    const baseY = chartH + 8;
    const bH = Math.max(2, (queryVals[i] / maxQ) * chartH);

    ctx.fillStyle = grad;
    ctx.beginPath(); roundedRect(ctx, x, baseY - bH, barW, bH, Math.min(3, barW / 2)); ctx.fill();

    // Power day marker
    if (queryVals[i] >= p90 && p90 > 0) {
      ctx.fillStyle = '#F59E0B';
      ctx.font = '10px Inter, system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('\u26A1', x + barW / 2, baseY - bH - 4);
    }
  });

  // Cost line (orange)
  ctx.beginPath();
  ctx.strokeStyle = '#F97316'; ctx.lineWidth = 2;
  daily.forEach((d, i) => {
    const x = startX + i * (barW + gap) + barW / 2;
    const y = chartH + 8 - (costVals[i] / maxCost) * chartH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Cost dots
  ctx.fillStyle = '#F97316';
  daily.forEach((d, i) => {
    if (daily.length <= 60 || i % Math.max(1, Math.floor(daily.length / 30)) === 0) {
      const x = startX + i * (barW + gap) + barW / 2;
      const y = chartH + 8 - (costVals[i] / maxCost) * chartH;
      ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI * 2); ctx.fill();
    }
  });

  // X-axis labels
  ctx.fillStyle = '#94A3B8'; ctx.textAlign = 'center'; ctx.font = '500 9px Inter, system-ui';
  const step = Math.max(1, Math.floor(daily.length / 7));
  daily.forEach((d, i) => {
    if (i % step === 0 || i === daily.length - 1)
      ctx.fillText(formatDate(d.date), startX + i * (barW + gap) + barW / 2, chartH + 24);
  });

  // Tooltip
  setupChartTooltip(canvas, daily, startX, barW, gap, chartH, (d, i) => {
    return `${d.date} &mdash; ${queryVals[i]} queries, ${fmt(d.tokens || 0)} tokens, ${fmtCost(costVals[i])}`;
  });
}

function renderDonut(canvasId, legendId, modelMap) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const entries = Object.entries(modelMap).sort((a,b) => b[1].tokens - a[1].tokens);
  if (!entries.length) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const size = Math.min(160, canvas.parentElement.clientWidth - 48);
  canvas.width = size * dpr; canvas.height = size * dpr;
  canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
  ctx.scale(dpr, dpr);
  const cx = size/2, cy = size/2, r = size/2 - 6, ir = r * 0.6;
  const total = entries.reduce((s,[,v]) => s + v.tokens, 0);
  let angle = -Math.PI / 2;
  entries.forEach(([model, v]) => {
    const sa = (v.tokens / total) * Math.PI * 2;
    ctx.beginPath(); ctx.arc(cx, cy, r, angle, angle + sa); ctx.arc(cx, cy, ir, angle + sa, angle, true); ctx.closePath();
    ctx.fillStyle = getModelColor(model); ctx.fill();
    ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2; ctx.stroke();
    angle += sa;
  });
  ctx.fillStyle = '#0F172A'; ctx.textAlign = 'center';
  ctx.font = '800 16px Inter, system-ui'; ctx.fillText(fmt(total), cx, cy + 2);
  ctx.font = '500 9px Inter, system-ui'; ctx.fillStyle = '#94A3B8'; ctx.fillText('tokens', cx, cy + 14);

  const leg = document.getElementById(legendId);
  if (leg) leg.innerHTML = entries.map(([model, v]) => {
    const pct = ((v.tokens / total) * 100).toFixed(1);
    return `<div class="legend-item"><div class="legend-dot" style="background:${getModelColor(model)}"></div><span><strong>${modelShort(model)}</strong> ${fmt(v.tokens)} (${pct}%) ${fmtCost(v.cost)}</span></div>`;
  }).join('');
}

/* === FEATURE 1: Contribution Heatmap === */
function renderHeatmap(canvasId, dailyData, isTeam) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  // Build a map of date -> queries
  const dayMap = {};
  for (const d of dailyData) {
    if (d.date) dayMap[d.date] = (dayMap[d.date] || 0) + (d.queries || 0);
  }

  // Dynamic range: from first data date to today
  const today = new Date();
  const allDates = Object.keys(dayMap).sort();
  const firstDate = allDates.length > 0 ? new Date(allDates[0]) : new Date(today);

  // Align start to Sunday of the week containing firstDate
  const startDate = new Date(firstDate);
  startDate.setDate(startDate.getDate() - startDate.getDay());

  // Calculate number of weeks from startDate to today
  const totalDays = Math.ceil((today - startDate) / 86400000) + 1;
  const cols = Math.ceil(totalDays / 7);
  const rows = 7;

  const cellSize = 12, cellGap = 2, leftPad = 30, topPad = 18;
  const maxW = canvas.parentElement.clientWidth - 48;
  // Shrink cells if needed to fit
  const neededW = leftPad + cols * (cellSize + cellGap) + 10;
  const scale = neededW > maxW ? maxW / neededW : 1;
  const cs = Math.floor(cellSize * scale), cg = Math.max(1, Math.floor(cellGap * scale));

  const w = leftPad + cols * (cs + cg) + 10;
  const h = topPad + rows * (cs + cg) + 10;

  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);

  // Get all query values to compute intensity levels
  const allVals = Object.values(dayMap).filter(v => v > 0);
  const maxQ = allVals.length > 0 ? Math.max(...allVals) : 1;
  const levels = [0, maxQ * 0.15, maxQ * 0.35, maxQ * 0.6, maxQ * 0.85];
  const colors = ['#eee', '#B2DFDB', '#4DB6AC', '#00897B', '#00695C', '#004D40'];

  // Day labels
  ctx.font = '500 9px Inter, system-ui'; ctx.fillStyle = '#94A3B8'; ctx.textAlign = 'right';
  const dayLabels = ['', 'M', '', 'W', '', 'F', ''];
  for (let r = 0; r < 7; r++) {
    if (dayLabels[r]) ctx.fillText(dayLabels[r], leftPad - 6, topPad + r * (cs + cg) + cs - 2);
  }

  // Month labels
  ctx.textAlign = 'center';
  let lastMonth = -1;
  const cellDates = [];
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows; r++) {
      const dt = new Date(startDate);
      dt.setDate(dt.getDate() + c * 7 + r);
      cellDates.push({ col: c, row: r, date: dt });
      if (r === 0 && dt.getMonth() !== lastMonth) {
        lastMonth = dt.getMonth();
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        ctx.fillText(months[lastMonth], leftPad + c * (cs + cg) + cs / 2, topPad - 6);
      }
    }
  }

  // Draw cells + store hit areas for tooltip
  const hitAreas = [];
  for (const cell of cellDates) {
    const { col, row, date: dt } = cell;
    const dateStr = toISO(dt);
    const val = dayMap[dateStr] || 0;
    const x = leftPad + col * (cs + cg);
    const y = topPad + row * (cs + cg);

    let colorIdx = 0;
    if (val > 0) {
      for (let l = levels.length - 1; l >= 0; l--) {
        if (val >= levels[l]) { colorIdx = l + 1; break; }
      }
    }

    ctx.fillStyle = dt > today ? '#f5f5f5' : colors[colorIdx];
    ctx.beginPath();
    roundedRect(ctx, x, y, cs, cs, 2);
    ctx.fill();

    hitAreas.push({ x, y, w: cs, h: cs, dateStr, val, dt });
  }

  // Tooltip handling
  const tooltip = document.getElementById('heatmapTooltip');
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width) / dpr;
    const my = (e.clientY - rect.top) * (canvas.height / rect.height) / dpr;
    let found = null;
    for (const ha of hitAreas) {
      if (mx >= ha.x && mx <= ha.x + ha.w && my >= ha.y && my <= ha.y + ha.h) { found = ha; break; }
    }
    if (found && found.dt <= today) {
      const dayName = found.dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const sessions = dailyData.find(d => d.date === found.dateStr);
      const sessCount = sessions ? (sessions.sessions || 0) : 0;
      const cost = sessions ? (sessions.cost || 0) : 0;
      tooltip.innerHTML = `${dayName} &mdash; ${found.val} queries, ${sessCount} sessions, ${fmtCost(cost)}`;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    } else {
      tooltip.style.display = 'none';
    }
  };
  canvas.onmouseleave = () => { tooltip.style.display = 'none'; };
}

/* === FEATURE 2: Radar Chart Rendering === */
function drawRadar(ctx, cx, cy, r, data, color, fillAlpha, showLabels, showValues) {
  const n = data.length;
  const angleStep = (Math.PI * 2) / n;

  // Grid rings
  if (showLabels) {
    for (let ring = 1; ring <= 4; ring++) {
      const rr = (r * ring) / 4;
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1;
      for (let i = 0; i <= n; i++) {
        const a = -Math.PI / 2 + i * angleStep;
        const x = cx + Math.cos(a) * rr;
        const y = cy + Math.sin(a) * rr;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // Axis lines
    for (let i = 0; i < n; i++) {
      const a = -Math.PI / 2 + i * angleStep;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
      ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Data polygon
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const a = -Math.PI / 2 + i * angleStep;
    const val = Math.max(0, Math.min(100, data[i].score)) / 100;
    const x = cx + Math.cos(a) * r * val;
    const y = cy + Math.sin(a) * r * val;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = color.replace(')', `,${fillAlpha})`).replace('rgb', 'rgba');
  ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();

  // Labels
  if (showLabels) {
    ctx.font = '600 10px Inter, system-ui'; ctx.fillStyle = '#475569'; ctx.textAlign = 'center';
    for (let i = 0; i < n; i++) {
      const a = -Math.PI / 2 + i * angleStep;
      const lx = cx + Math.cos(a) * (r + 20);
      const ly = cy + Math.sin(a) * (r + 20);
      ctx.fillText(data[i].label, lx, ly + 3);
      if (showValues && data[i].raw !== undefined) {
        ctx.font = '500 9px Inter, system-ui'; ctx.fillStyle = '#94A3B8';
        ctx.fillText(String(data[i].raw), lx, ly + 14);
        ctx.font = '600 10px Inter, system-ui'; ctx.fillStyle = '#475569';
      }
    }
  }
}

/* === FEATURE 4: Cache Efficiency Over Time Chart === */
function renderCacheEfficiencyChart(canvasId, daily, totalCacheRead, totalTokens) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !daily.length) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth - 48;
  const h = 180;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);

  const startX = 44, chartH = h - 36;

  // Compute daily cache hit ratio
  const ratios = daily.map(d => {
    const total = (d.tokens || 0);
    return total > 0 ? ((d.cacheReadTokens || 0) / total) * 100 : 0;
  });

  // Team avg cache hit ratio (from PROD_DATA)
  const teamAvg = PROD_DATA.team.cacheHitRate || 0;

  // Savings badge: $2.70/MTok saving rate
  const savingRate = 2.70 / 1e6;
  const totalSavings = (totalCacheRead || 0) * savingRate;

  const barW = Math.max(4, Math.min(24, (w - 80) / daily.length - 2));
  const gap = 2;

  // Y-axis
  ctx.font = '500 9px Inter, system-ui'; ctx.fillStyle = '#94A3B8'; ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = 25 * i;
    const y = chartH - (chartH * i / 4) + 8;
    ctx.fillText(val + '%', startX - 8, y + 3);
    ctx.strokeStyle = 'rgba(0,0,0,0.04)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(w - 10, y); ctx.stroke();
  }

  // Team avg reference line
  const refY = chartH + 8 - (teamAvg / 100) * chartH;
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = '#94A3B8'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(startX, refY); ctx.lineTo(w - 10, refY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#94A3B8'; ctx.textAlign = 'left'; ctx.font = '500 8px Inter, system-ui';
  ctx.fillText('Team avg: ' + teamAvg.toFixed(1) + '%', startX + 4, refY - 4);

  // Area fill
  ctx.beginPath();
  ctx.moveTo(startX, chartH + 8);
  daily.forEach((d, i) => {
    const x = startX + i * (barW + gap) + barW / 2;
    const y = chartH + 8 - (ratios[i] / 100) * chartH;
    ctx.lineTo(x, y);
  });
  ctx.lineTo(startX + (daily.length - 1) * (barW + gap) + barW / 2, chartH + 8);
  ctx.closePath();
  ctx.fillStyle = 'rgba(245,158,11,0.15)';
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#F59E0B'; ctx.lineWidth = 2;
  daily.forEach((d, i) => {
    const x = startX + i * (barW + gap) + barW / 2;
    const y = chartH + 8 - (ratios[i] / 100) * chartH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots
  ctx.fillStyle = '#F59E0B';
  daily.forEach((d, i) => {
    if (daily.length <= 60 || i % Math.max(1, Math.floor(daily.length / 30)) === 0) {
      const x = startX + i * (barW + gap) + barW / 2;
      const y = chartH + 8 - (ratios[i] / 100) * chartH;
      ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI * 2); ctx.fill();
    }
  });

  // X-axis labels
  ctx.fillStyle = '#94A3B8'; ctx.textAlign = 'center'; ctx.font = '500 9px Inter, system-ui';
  const step = Math.max(1, Math.floor(daily.length / 7));
  daily.forEach((d, i) => {
    if (i % step === 0 || i === daily.length - 1)
      ctx.fillText(formatDate(d.date), startX + i * (barW + gap) + barW / 2, chartH + 24);
  });

  // Savings badge
  ctx.fillStyle = '#F59E0B'; ctx.font = '700 11px Inter, system-ui'; ctx.textAlign = 'right';
  const badgeText = '$' + totalSavings.toFixed(2) + ' saved';
  const tw = ctx.measureText(badgeText).width;
  ctx.fillStyle = 'rgba(245,158,11,0.1)';
  roundedRect(ctx, w - tw - 28, 2, tw + 16, 20, 6);
  ctx.fill();
  ctx.fillStyle = '#B45309'; ctx.textAlign = 'center';
  ctx.fillText(badgeText, w - tw / 2 - 20, 16);

  // Tooltip
  let cumSavings = 0;
  const cumSavingsArr = daily.map(d => { cumSavings += (d.cacheReadTokens || 0) * savingRate; return cumSavings; });
  setupChartTooltip(canvas, daily, startX, barW, gap, chartH, (d, i) => {
    return `${d.date} &mdash; Cache hit: ${ratios[i].toFixed(1)}%, Cumulative savings: $${cumSavingsArr[i].toFixed(2)}`;
  });
}

/* === FEATURE 5: Session Depth Histogram === */
function renderSessionHistogram(canvasId, statsId, sessions) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !sessions.length) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth - 48;
  const h = 160;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);

  const depths = sessions.map(s => s.queryCount || 0);
  const bins = [
    { label: '1', min: 1, max: 1, count: 0 },
    { label: '2-3', min: 2, max: 3, count: 0 },
    { label: '4-6', min: 4, max: 6, count: 0 },
    { label: '7-10', min: 7, max: 10, count: 0 },
    { label: '11-20', min: 11, max: 20, count: 0 },
    { label: '20+', min: 21, max: Infinity, count: 0 },
  ];
  for (const q of depths) {
    for (const b of bins) {
      if (q >= b.min && q <= b.max) { b.count++; break; }
    }
  }
  const maxCount = Math.max(...bins.map(b => b.count), 1);

  const startX = 60, barH = 18, gapY = 6, chartW = w - startX - 60;

  bins.forEach((b, i) => {
    const y = 10 + i * (barH + gapY);
    const bW = Math.max(2, (b.count / maxCount) * chartW);

    // Label
    ctx.font = '600 11px Inter, system-ui'; ctx.fillStyle = '#475569'; ctx.textAlign = 'right';
    ctx.fillText(b.label, startX - 10, y + barH / 2 + 4);

    // Bar
    ctx.fillStyle = '#8B5CF6';
    ctx.beginPath(); roundedRect(ctx, startX, y, bW, barH, 4); ctx.fill();

    // Count
    ctx.font = '600 11px Inter, system-ui'; ctx.fillStyle = '#475569'; ctx.textAlign = 'left';
    ctx.fillText(b.count, startX + bW + 6, y + barH / 2 + 4);
  });

  // Stats
  const sorted = [...depths].sort((a, b) => a - b);
  const avg = sorted.length ? (sorted.reduce((a, b) => a + b, 0) / sorted.length).toFixed(1) : 0;
  const median = sorted.length ? sorted[Math.floor(sorted.length / 2)] : 0;
  const p90 = sorted.length ? sorted[Math.floor(sorted.length * 0.9)] : 0;

  const statsEl = document.getElementById(statsId);
  if (statsEl) {
    statsEl.innerHTML = `
      <div style="display:flex;gap:24px;font-size:12px;color:var(--text-secondary);font-weight:500">
        <span><strong style="color:var(--text);font-size:16px;font-weight:800">${avg}</strong> avg</span>
        <span><strong style="color:var(--text);font-size:16px;font-weight:800">${median}</strong> median</span>
        <span><strong style="color:var(--text);font-size:16px;font-weight:800">${p90}</strong> p90</span>
      </div>
    `;
  }
}

/* === FEATURE 7: Streak Calendar View === */
function renderStreakCalendar(canvasId, statsId, sessions) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  // Build day->session count map from ALL sessions (not just filtered for longest streak)
  const dayCount = {};
  for (const s of sessions) {
    if (s.date && s.date !== 'unknown') dayCount[s.date] = (dayCount[s.date] || 0) + 1;
  }

  const today = new Date();
  const allDates = Object.keys(dayCount).sort();
  const firstDate = allDates.length > 0 ? new Date(allDates[0]) : new Date(today);

  // Total days from first active date to today
  const days = Math.ceil((today - firstDate) / 86400000) + 1;
  const cols = Math.min(30, days); // max 30 columns, wrap into rows
  const rows = Math.ceil(days / cols);

  const cellSize = 14, cellGap = 3;
  const maxW = canvas.parentElement.clientWidth - 20;
  const neededW = 10 + cols * (cellSize + cellGap) + 10;
  const scale = neededW > maxW ? maxW / neededW : 1;
  const cs = Math.max(6, Math.floor(cellSize * scale)), cg = Math.max(1, Math.floor(cellGap * scale));

  const leftPad = 10, topPad = 6;
  const w = leftPad + cols * (cs + cg) + 10;
  const h = topPad + rows * (cs + cg) + 10;

  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);

  const startDate = new Date(firstDate);

  let totalActiveDays = 0;
  const maxSess = Math.max(...Object.values(dayCount), 1);
  const l1 = maxSess * 0.33, l2 = maxSess * 0.66;

  for (let i = 0; i < days; i++) {
    const dt = new Date(startDate);
    dt.setDate(dt.getDate() + i);
    const dateStr = toISO(dt);
    const count = dayCount[dateStr] || 0;
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = leftPad + col * (cs + cg);
    const y = topPad + row * (cs + cg);

    if (dt > today) {
      ctx.fillStyle = '#E2E8F0';
    } else if (count === 0) {
      ctx.fillStyle = '#F1F5F9';
    } else {
      totalActiveDays++;
      if (count > l2) ctx.fillStyle = '#00695C';
      else if (count > l1) ctx.fillStyle = '#00897B';
      else ctx.fillStyle = '#4DB6AC';
    }

    ctx.beginPath();
    ctx.arc(x + cs / 2, y + cs / 2, cs / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Compute streaks from ALL session history
  const allDays = Object.keys(dayCount).sort();
  let currentStreak = 0, longestStreak = 0, tempStreak = 1;

  // Helper: check if gap between two dates only contains weekend days
  function gapIsOnlyWeekends(prev, curr) {
    const diffDays = (curr - prev) / 86400000;
    for (let d = 1; d < diffDays; d++) {
      const between = new Date(prev.getTime() + d * 86400000);
      const dow = between.getDay();
      if (dow !== 0 && dow !== 6) return false;
    }
    return true;
  }

  // Longest streak (weekends don't break streaks)
  for (let i = 1; i < allDays.length; i++) {
    const prev = new Date(allDays[i - 1]), curr = new Date(allDays[i]);
    const diff = (curr - prev) / 86400000;
    if (diff <= 1 || gapIsOnlyWeekends(prev, curr)) tempStreak++;
    else { longestStreak = Math.max(longestStreak, tempStreak); tempStreak = 1; }
  }
  longestStreak = Math.max(longestStreak, tempStreak);

  // Current streak (from most recent day going backwards, weekends don't break)
  if (allDays.length > 0) {
    currentStreak = 1;
    for (let i = allDays.length - 1; i > 0; i--) {
      const prev = new Date(allDays[i - 1]), curr = new Date(allDays[i]);
      const diff = (curr - prev) / 86400000;
      if (diff <= 1 || gapIsOnlyWeekends(prev, curr)) currentStreak++;
      else break;
    }
  }

  const statsEl = document.getElementById(statsId);
  if (statsEl) {
    statsEl.innerHTML = `
      <div><span class="streak-stat-val">${currentStreak}</span>Current streak (days)</div>
      <div><span class="streak-stat-val">${longestStreak}</span>Longest streak (days)</div>
      <div><span class="streak-stat-val">${totalActiveDays}</span>Active days (${days}d range)</div>
    `;
  }
}

// --- Shared chart tooltip helper ---
function setupChartTooltip(canvas, data, startX, barW, gap, chartH, formatFn) {
  const tooltip = document.getElementById('chartTooltip');
  const dpr = window.devicePixelRatio || 1;
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width) / dpr;
    const idx = Math.floor((mx - startX) / (barW + gap));
    if (idx >= 0 && idx < data.length) {
      tooltip.innerHTML = formatFn(data[idx], idx);
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    } else {
      tooltip.style.display = 'none';
    }
  };
  canvas.onmouseleave = () => { tooltip.style.display = 'none'; };
}

function roundedRect(ctx, x, y, w, h, r) {
  if (h <= 0) return;
  r = Math.min(r, h/2, w/2);
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

/* === FEATURE 4c: Dismiss inactive alert === */
function dismissInactiveAlert() {
  inactiveAlertDismissed = true;
  const el = document.getElementById('inactiveAlert');
  if (el) el.remove();
}

function dismissGuide() {
  gettingStartedDismissed = true;
  localStorage.setItem('cs_guide_dismissed', '1');
  const el = document.getElementById('gettingStarted');
  if (el) el.style.transition = 'opacity 0.3s, transform 0.3s';
  if (el) { el.style.opacity = '0'; el.style.transform = 'translateY(-10px)'; setTimeout(() => el.remove(), 300); }
}

/* === FEATURE 3c: Health History Line Chart === */
function renderHealthHistoryChart(canvasId, legendId, history) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !history || history.length < 2) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth - 48;
  const h = 220;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);

  const startX = 44, chartH = h - 36, rightMargin = 10;

  // Collect all dev names
  const devNames = new Set();
  for (const entry of history) {
    if (entry.devScores) Object.keys(entry.devScores).forEach(n => devNames.add(n));
  }
  const devList = [...devNames];

  // Y-axis (0-100)
  ctx.font = '500 9px Inter, system-ui'; ctx.fillStyle = '#94A3B8'; ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = 25 * i;
    const y = chartH - (chartH * i / 4) + 8;
    ctx.fillText(val, startX - 8, y + 3);
    ctx.strokeStyle = 'rgba(0,0,0,0.04)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(w - rightMargin, y); ctx.stroke();
  }

  // Target reference line at 70
  const refY = chartH + 8 - (70 / 100) * chartH;
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = '#94A3B8'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(startX, refY); ctx.lineTo(w - rightMargin, refY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#94A3B8'; ctx.textAlign = 'left'; ctx.font = '500 8px Inter, system-ui';
  ctx.fillText('Target: 70', startX + 4, refY - 4);

  const pointSpacing = (w - startX - rightMargin) / Math.max(1, history.length - 1);

  // Draw dev lines (semi-transparent)
  devList.forEach((devName, di) => {
    const color = DEV_COLORS[di % DEV_COLORS.length];
    ctx.beginPath();
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.4;
    let started = false;
    history.forEach((entry, i) => {
      const score = entry.devScores && entry.devScores[devName];
      if (score == null) return;
      const x = startX + i * pointSpacing;
      const y = chartH + 8 - (score / 100) * chartH;
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // Draw team average line (bold) with area fill
  ctx.beginPath();
  const teamPoints = [];
  history.forEach((entry, i) => {
    const x = startX + i * pointSpacing;
    const y = chartH + 8 - (entry.teamScore / 100) * chartH;
    teamPoints.push({ x, y });
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });

  // Area fill under team line
  if (teamPoints.length >= 2) {
    const areaPath = new Path2D();
    areaPath.moveTo(teamPoints[0].x, chartH + 8);
    for (const p of teamPoints) areaPath.lineTo(p.x, p.y);
    areaPath.lineTo(teamPoints[teamPoints.length - 1].x, chartH + 8);
    areaPath.closePath();
    ctx.fillStyle = 'rgba(99,102,241,0.08)';
    ctx.fill(areaPath);
  }

  // Team line stroke
  ctx.beginPath();
  teamPoints.forEach((p, i) => { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
  ctx.strokeStyle = '#6366F1'; ctx.lineWidth = 2.5; ctx.stroke();

  // Team dots
  ctx.fillStyle = '#6366F1';
  teamPoints.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill(); });

  // X-axis labels
  ctx.fillStyle = '#94A3B8'; ctx.textAlign = 'center'; ctx.font = '500 9px Inter, system-ui';
  const step = Math.max(1, Math.floor(history.length / 7));
  history.forEach((entry, i) => {
    if (i % step === 0 || i === history.length - 1)
      ctx.fillText(formatDate(entry.date), startX + i * pointSpacing, chartH + 24);
  });

  // Tooltip
  setupChartTooltip(canvas, history, startX, pointSpacing - 2, 2, chartH, (entry, i) => {
    let tip = entry.date + ' &mdash; Team: ' + entry.teamScore;
    if (entry.devScores) {
      for (const [name, score] of Object.entries(entry.devScores)) {
        tip += ', ' + name + ': ' + score;
      }
    }
    return tip;
  });

  // Legend
  const leg = document.getElementById(legendId);
  if (leg) {
    let html = '<div class="legend-item"><div class="legend-dot" style="background:#6366F1"></div><span style="font-weight:700">Team Average</span></div>';
    devList.forEach((name, i) => {
      html += `<div class="legend-item"><div class="legend-dot" style="background:${DEV_COLORS[i % DEV_COLORS.length]};opacity:0.5"></div><span>${esc(name)}</span></div>`;
    });
    leg.innerHTML = html;
  }
}

// Init
loadData();
</script>
